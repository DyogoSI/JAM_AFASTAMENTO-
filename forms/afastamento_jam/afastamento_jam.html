<!DOCTYPE html>
<html>
<head>
    <title>Afastamento de Pessoal - JAM Engenharia</title>
    <meta charset="utf-8">
    
    <link type="text/css" rel="stylesheet" href="/style-guide/css/fluig-style-guide.min.css"/>
    
    <script type="text/javascript" src="/portal/resources/js/jquery/jquery.js"></script>
    <script type="text/javascript" src="/portal/resources/js/jquery/jquery-ui.min.js"></script>
    <script type="text/javascript" src="/portal/resources/js/mustache/mustache-min.js"></script>

    <style>
        /* =========================================
           RESET E BACKGROUND
        ========================================= */
        * { box-sizing: border-box; }
        body, html {
            background: linear-gradient(135deg, #e6eef5 0%, #d5dfe8 100%);
            min-height: 100vh; font-family: 'Segoe UI', Helvetica, Arial, sans-serif; margin: 0; padding: 0;
        }
        form { padding: 40px 20px; max-width: 98%; margin: 0 auto; }
        
        /* =========================================
           SISTEMA DE GRID CUSTOMIZADO (FLEXBOX)
        ========================================= */
        .container-fluid { width: 100%; }
        .row { display: flex; flex-wrap: wrap; margin-right: -15px; margin-left: -15px; }
        .col-md-2 { flex: 0 0 16.666667%; max-width: 16.666667%; padding: 0 15px; }
        .col-md-3 { flex: 0 0 25%; max-width: 25%; padding: 0 15px; }
        .col-md-4 { flex: 0 0 33.333333%; max-width: 33.333333%; padding: 0 15px; }
        .col-md-5 { flex: 0 0 41.666667%; max-width: 41.666667%; padding: 0 15px; }
        .col-md-6 { flex: 0 0 50%; max-width: 50%; padding: 0 15px; }
        .col-md-8 { flex: 0 0 66.666667%; max-width: 66.666667%; padding: 0 15px; }
        .col-md-12 { flex: 0 0 100%; max-width: 100%; padding: 0 15px; }
        .form-group { margin-bottom: 15px; width: 100%; }
        @media (max-width: 768px) { .col-md-2, .col-md-3, .col-md-4, .col-md-5, .col-md-6, .col-md-8, .col-md-12 { flex: 0 0 100%; max-width: 100%; } }
        
        /* =========================================
           CABEÇALHO DA PÁGINA
        ========================================= */
        .page-header {
            background-color: #ffffff; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.06);
            border-top: 6px solid #2C75B9; text-align: center; margin-bottom: 35px; border-bottom: none;
        }
        .page-header h2 { font-weight: 800; color: #F29620; margin: 0; letter-spacing: 0.5px; text-transform: uppercase; font-size: 24px; }
        
        /* =========================================
           ESTILO DOS PAINÉIS E TIMELINE DINÂMICA
        ========================================= */
        .panel { border-radius: 12px; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08); margin-bottom: 30px; background-color: #ffffff; overflow: hidden; display: block; width: 100%; border: none; }
        .panel-heading { padding: 18px 25px; background-color: #2C75B9; color: white; }
        
        /* Cores Dinâmicas da Timeline */
        .painel-obs-dinamico > .panel-heading { background-color: #F29620; color: white; border: none; transition: background-color 0.3s; }
        .painel-correcao-dinamico > .panel-heading { background-color: #d9534f !important; color: white; border: none; transition: background-color 0.3s; }
        .painel-bpo-dinamico > .panel-heading { background-color: #1e5283 !important; color: white; border: none; transition: background-color 0.3s; }
        .painel-acao-dinamico > .panel-heading { background-color: #34C759 !important; color: white; border: none; transition: background-color 0.3s; }
        
        .panel-title { font-size: 17px; font-weight: 700; color: #ffffff; display: flex; align-items: center; text-transform: uppercase; letter-spacing: 1px; margin: 0; }
        .panel-body { padding: 30px 25px; }
        
        .panel-title .fluigicon { margin-right: 10px; width: 18px; height: 18px; filter: brightness(0) invert(1); display: inline-block; background-size: contain; background-repeat: no-repeat; background-position: center; }
        .panel-title .fluigicon::before { content: none !important; }

        /* =========================================
           FORMULÁRIOS E INPUTS
        ========================================= */
        label { font-weight: 700; color: #2C75B9; margin-bottom: 5px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; display: block; }
        .label-obrigatorio::after { content: " *"; color: #d9534f; font-weight: bold; }
        
        .form-control { border-radius: 6px !important; border: 1px solid #c0c6cc !important; padding: 6px 12px !important; height: 36px !important; line-height: 1.42857143 !important; font-size: 13px !important; color: #444 !important; transition: all 0.3s ease; display: block; width: 100%; background-color: #fff; box-sizing: border-box; font-family: inherit; }
        textarea.form-control { height: auto !important; min-height: 100px !important; resize: vertical; padding: 10px 12px !important; }
        select.form-control { appearance: auto; }
        .form-control:focus { border-color: #F29620; box-shadow: 0 0 0 3px rgba(242, 150, 32, 0.15); outline: none; }
        .form-control[readonly], .form-control[disabled] { background-color: #f4f6f9 !important; color: #7a828a !important; border-color: #e2e7ec !important; cursor: not-allowed; font-weight: 500; }
        
        /* LUPA E ZOOM */
        .input-group { display: flex !important; width: 100% !important; align-items: stretch !important; height: 36px !important; }
        .input-group .form-control { border-top-right-radius: 0 !important; border-bottom-right-radius: 0 !important; flex: 1 !important; margin: 0 !important; z-index: 1; height: 36px !important; }
        .input-group-addon .fluigicon { display: none !important; }
        .input-group-addon { background-color: #f4f6f9 !important; border: 1px solid #c0c6cc !important; border-left: none !important; border-radius: 0 6px 6px 0 !important; width: 40px !important; height: 36px !important; cursor: pointer; padding: 0 !important; margin: 0 !important; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="16" height="16"><path fill="%232C75B9" d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376c-34.4 25.2-76.8 40-122.7 40C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z"/></svg>') !important; background-repeat: no-repeat !important; background-position: center !important; background-size: 16px !important; }
        .select2-container { width: 100% !important; }
        .select2-container .select2-selection--single { min-height: 36px !important; height: 36px !important; border-radius: 6px !important; border: 1px solid #c0c6cc !important; padding: 0 8px !important; display: flex !important; align-items: center !important; background-color: #fff !important; }
        .select2-container--default .select2-selection--single .select2-selection__rendered { line-height: normal !important; padding: 0 4px !important; font-size: 13px !important; color: #444 !important; width: 100%; }
        .select2-container--default .select2-selection--single .select2-selection__arrow { height: 34px !important; top: 1px !important; }
        
        /* =========================================
           ESTILOS DOS ANEXOS
        ========================================= */
        .caixa-anexo { background-color: #f8fafd; border: 2px dashed #b1c8df; border-radius: 10px; padding: 20px; margin-top: 15px; }
        .caixa-anexo label { color: #1e5283 !important; font-size: 14px; display: block; margin-bottom: 10px; text-transform: none; font-weight: 600; }
        .fluigFormAttachmentComponent { display: flex; width: 100%; gap: 8px; align-items: center; }
        .fluigFormAttachmentComponent input { flex: 1; min-width: 0; }
        .fluigFormAttachmentComponent_buttons { flex-shrink: 0; display: flex; gap: 5px; }
        .fluigFormAttachmentComponent_buttons .btn i { display: none !important; }
        .fluigFormAttachmentComponent_buttons .btn, .btn-anexo-historico {
            width: 32px !important; height: 32px !important; background-repeat: no-repeat !important; background-position: center !important; background-size: 14px !important; padding: 0 !important; border-radius: 4px !important; transition: all 0.2s ease; cursor: pointer;
        }
        .fluigFormAttachmentBtnDeleteFile { background-color: #d9534f !important; border: 1px solid #d43f3a !important; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path fill="%23ffffff" d="M135.2 17.7C140.6 6.8 151.7 0 163.8 0H284.2c12.1 0 23.2 6.8 28.6 17.7L320 32h96c17.7 0 32 14.3 32 32s-14.3 32-32 32H32C14.3 96 0 81.7 0 64S14.3 32 32h96l7.2-14.3zM32 128H416V448c0 35.3-28.7 64-64 64H96c-35.3 0-64-28.7-64-64V128zm96 64c-8.8 0-16 7.2-16 16V432c0 8.8 7.2 16 16 16s16-7.2 16-16V208c0-8.8-7.2-16-16-16zm96 0c-8.8 0-16 7.2-16 16V432c0 8.8 7.2 16 16 16s16-7.2 16-16V208c0-8.8-7.2-16-16-16z"/></svg>') !important; }
        .fluigFormAttachmentBtnUploadFile { background-color: #5cb85c !important; border: 1px solid #4cae4c !important; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path fill="%23ffffff" d="M364.2 83.8c-24.4-24.4-64-24.4-88.4 0l-184 184c-42.1 42.1-42.1 110.3 0 152.4s110.3 42.1 152.4 0l152-152c10.9-10.9 28.7-10.9 39.6 0s10.9 28.7 0 39.6l-152 152c-64 64-167.6 64-231.6 0s-64-167.6 0-231.6l184-184c46.3-46.3 121.3-46.3 167.6 0s46.3 121.3 0 167.6l-176 176c-28.6 28.6-75 28.6-103.6 0s-28.6-75 0-103.6l144-144c10.9-10.9 28.7-10.9 39.6 0s10.9 28.7 0 39.6l-144 144c-6.7 6.7-6.7 17.7 0 24.4s17.7 6.7 24.4 0l176-176c24.4-24.4 24.4-64 0-88.4z"/></svg>') !important; }
        .fluigFormAttachmentBtnViewerFile, .btn-anexo-historico { background-color: #5bc0de !important; border: 1px solid #46b8da !important; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512"><path fill="%23ffffff" d="M288 32c-80.8 0-145.5 36.8-192.6 80.6C48.6 156 17.3 208 2.5 243.7c-3.3 7.9-3.3 16.7 0 24.6C17.3 304 48.6 356 95.4 399.4C142.5 443.2 207.2 480 288 480s145.5-36.8 192.6-80.6c46.8-43.4 78.1-95.4 92.9-131.1c3.3-7.9 3.3-16.7 0-24.6c-14.8-35.7-46.1-87.7-92.9-131.1C433.5 68.8 368.8 32 288 32zM128 256a160 160 0 1 1 320 0 160 160 0 1 1 -320 0zm160 80a80 80 0 1 0 0-160 80 80 0 1 0 0 160z"/></svg>') !important; }
        
        /* Oculta a tabela original (Pai x Filho) para não ocupar espaço na tela */
        .tabelas-ocultas { height: 0px; overflow: hidden; visibility: hidden; }
        #historico-timeline { display: flex; flex-direction: column; gap: 25px; margin-top: 30px; margin-bottom: 30px; }
    </style>
</head>
<body>
    <form name="form" role="form">
        <input type="hidden" id="TxtChapa" name="TxtChapa" />
        <input type="hidden" id="CodPessoa" name="CodPessoa" />
        <input type="hidden" id="TxtNomeCol" name="TxtNomeCol" />
        <input type="hidden" id="DtLimitFer" name="DtLimitFer" />
        <input type="hidden" id="txtDtAdm" name="txtDtAdm" />
        <input type="hidden" id="txtMembCipaCod" name="txtMembCipaCod" />
        <input type="hidden" id="CodTipo" name="CodTipo" />
        <input type="hidden" id="CodCategoria" name="CodCategoria" />
        <input type="hidden" id="txtSalOrigem" name="txtSalOrigem" />
        <input type="hidden" id="TEMPRAZOCONTR" name="TEMPRAZOCONTR" />
        <input type="hidden" id="FIMPRAZOCONTR" name="FIMPRAZOCONTR" />
        <input type="hidden" id="NROFICHAREG" name="NROFICHAREG" />
        <input type="hidden" id="CODRECEBIMENTO" name="CODRECEBIMENTO" />
        <input type="hidden" id="CodFilialDestino" name="CodFilialDestino" />
        <input type="hidden" id="codSituacaoOculto" name="codSituacaoOculto" />
        
        <input type="text" id="cpReaberturaChamado" name="cpReaberturaChamado" style="display:none;" />
        <input type="text" id="cpParecerReabertura" name="cpParecerReabertura" style="display:none;" />
        <input type="text" id="cpRespGestor2" name="cpRespGestor2" style="display:none;" />
        <input type="text" id="cpDecisaoRH" name="cpDecisaoRH" style="display:none;" />
        <input type="text" id="cpParecercol2" name="cpParecercol2" style="display:none;" />
        <input type="text" id="cpFlagNovaRodada" name="cpFlagNovaRodada" style="display:none;" />

        <div class="container-fluid">
            
            <div class="page-header">
                <h2>AFASTAMENTO DE PESSOAL</h2>
            </div>
            
            <div class="panel panel-default" id="painelSolicitante">
                <div class="panel-heading">
                    <h3 class="panel-title"><i class="fluigicon fluigicon-user-config fluigicon-sm"></i> Dados do Solicitante</h3>
                </div>
                <div class="panel-body">
                    <div class="row">
                        <div class="col-md-3 form-group">
                            <label for="nSolicitacao">N. Solicitação</label>
                            <input type="text" class="form-control" name="nSolicitacao" id="nSolicitacao" readonly>
                        </div>
                        <div class="col-md-3 form-group">
                            <label for="dataAbertura">Data Abertura</label>
                            <input type="text" class="form-control" name="dataAbertura" id="dataAbertura" readonly>
                        </div>
                        <div class="col-md-6 form-group">
                            <label for="solicitante">Solicitante</label>
                            <input type="text" class="form-control" name="solicitante" id="solicitante" readonly>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="panel panel-primary" id="painelColaborador">
                <div class="panel-heading">
                    <h3 class="panel-title"><i class="fluigicon fluigicon-user fluigicon-sm"></i> Dados do Colaborador</h3>
                </div>
                <div class="panel-body">
                    <div class="row">
                        <div class="col-md-4 form-group">
                            <label for="empresaColab">Empresa-Filial</label>
                            <input type="zoom" id="empresaColab" name="empresaColab"
                                   data-zoom="{
                                       'displayKey':'NOME',
                                       'datasetId':'ds_empresaFilial',
                                       'maximumSelectionLength':'1',
                                       'placeholder':'Pesquise a coligada...',
                                       'fields':[
                                           {'field':'COLIGADA', 'label':'Coligada'},
                                           {'field':'NOME', 'label':'Nome da Empresa', 'standard':'true','search':'true'},
                                           {'field':'CODFILIAL', 'label':'Filial'},
                                           {'field':'NOMEFANTASIAFILIAL', 'label':'Nome Filial', 'search':'true'}
                                       ]
                                   }" class="form-control" />
                        </div>
                        <div class="col-md-4 form-group">
                            <label for="dptoObraColab">Dpto/Obra</label>
                            <input type="zoom" id="dptoObraColab" name="dptoObraColab"
                                   data-zoom="{
                                       'displayKey':'DESCRICAO',
                                       'datasetId':'ds_dptoObra',
                                       'maximumSelectionLength':'1',
                                       'placeholder':'Pesquise o dpto/obra...',
                                       'fields':[
                                           {'field':'CODIGO', 'label':'Código'},
                                           {'field':'DESCRICAO', 'label':'Descrição do Dpto/Obra', 'standard':'true', 'search':'true'},
                                           {'field':'CODFILIAL', 'visible':'false'},
                                           {'field':'CODCOLIGADA', 'visible':'false'}
                                       ]
                                   }" class="form-control" />
                        </div>
                        <div class="col-md-4 form-group">
                            <label for="nomeColaborador">Nome do Colaborador</label>
                            <input type="zoom" id="nomeColaborador" name="nomeColaborador"
                                   data-zoom="{
                                       'displayKey':'NOME',
                                       'datasetId':'ds_colaboradores',
                                       'maximumSelectionLength':'1',
                                       'placeholder':'Pesquise o colaborador...',
                                       'fields':[
                                           {'field':'CHAPA', 'label':'Matrícula'},
                                           {'field':'NOME', 'label':'Nome', 'standard':'true', 'search':'true'},
                                           {'field':'CARGO', 'visible':'false'},
                                           {'field':'DATAADMISSAO', 'visible':'false'},
                                           {'field':'TIPOFUNCIONARIO', 'visible':'false'},
                                           {'field':'SITUACAO', 'visible':'false'},
                                           {'field':'CODSITUACAO', 'visible':'false'},
                                           {'field':'CODCOLIGADA', 'visible':'false'},
                                           {'field':'CODFILIAL', 'visible':'false'},
                                           {'field':'CODSECAO', 'visible':'false'}
                                       ]
                                   }" class="form-control" />
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-2 form-group">
                            <label for="matricula">Matrícula</label>
                            <input type="text" class="form-control" name="matricula" id="matricula" readonly>
                        </div>
                        <div class="col-md-3 form-group">
                            <label for="dataAdmissao">Data da Admissão</label>
                            <input type="text" class="form-control" name="dataAdmissao" id="dataAdmissao" readonly>
                        </div>
                        <div class="col-md-4 form-group">
                            <label for="cargo">Cargo Atual</label>
                            <input type="text" class="form-control" name="cargo" id="cargo" readonly>
                        </div>
                        <div class="col-md-3 form-group">
                            <label for="codSituacao">Situação</label>
                            <input type="text" class="form-control" name="codSituacao" id="codSituacao" readonly>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-8 form-group">
                            <label for="gestor">Gestor</label>
                            <input type="text" class="form-control" name="gestor" id="gestor" readonly>
                        </div>
                        <div class="col-md-4 form-group">
                            <label for="tipoFuncionario">Tipo Funcionário</label>
                            <input type="text" class="form-control" name="tipoFuncionario" id="tipoFuncionario" readonly>
                        </div>
                    </div>
                </div>

<script type="text/javascript">
    $(document).ready(function() {
        
        // =========================================================================
        // CORREÇÃO DE CORS NO UPLOAD: Intercepta e reescreve a URL do servidor
        // =========================================================================
        if (parent && parent.$) {
            parent.$.ajaxPrefilter(function(options, originalOptions, jqXHR) {
                // Verifica se a requisição está indo para a rota nativa de upload do Fluig
                if (options.url && options.url.indexOf("/ecm/upload") !== -1) {
                    // Remove qualquer IP ou Domínio fixo da URL e força usar o domínio atual do navegador
                    options.url = options.url.replace(/^https?:\/\/[^\/]+/, window.location.origin);
                }
            });
        }
        // =========================================================================

        setTimeout(function() {
            if(window["dptoObraColab"]) window["dptoObraColab"].disable(true);
            if(window["nomeColaborador"]) window["nomeColaborador"].disable(true);
            
            var atvAtual = (typeof ATIVIDADE_ATUAL !== 'undefined') ? ATIVIDADE_ATUAL : 0;
            var modo = (typeof MODO_FORMULARIO !== 'undefined') ? MODO_FORMULARIO : 'ADD';
            
            // Tratar os asteriscos e visibilidade do painel principal (Afastamento)
            tratarAcaoAfastamento($("#cpTipoAfastamento").val());
            
            // Oculta/Bloqueia o painel de Afastamento caso não tenha colaborador selecionado
            if ((atvAtual == 0 || atvAtual == 3 || atvAtual == 6) && modo !== "VIEW") {
                if ($("#matricula").val() == "") {
                    $("#painelAfastamento .panel-body").css({"pointer-events": "none", "opacity": "0.4"});
                }
            }
            
            $(".fluigicon-trash").hide();
            
            // GERAÇÃO E EMPILHAMENTO DA TIMELINE (ID ATIVIDADES: 4=RH, 6=CORREÇÃO, 11=AÇÃO)
            if (modo !== "VIEW") {
                var $clonedRows = $("input[id^='tipoInteracao___']").closest("tr");
                var totalRows = $clonedRows.length;
                var lastType = totalRows > 0 ? $clonedRows.last().find("input[id^='tipoInteracao___']").val() : "";

                if (atvAtual == 0 || atvAtual == 3) {
                    if (totalRows <= 1) adicionarInteracao("SOLICITANTE");
                } 
                else if (atvAtual == 4) {
                    if (lastType !== "BPO") adicionarInteracao("BPO");
                } 
                else if (atvAtual == 6) {
                    if (lastType !== "CORRECAO") adicionarInteracao("CORRECAO");
                }
                else if (atvAtual == 11) {
                    if (lastType !== "ACAO") adicionarInteracao("ACAO");
                }
            }
            
            aplicarCongelamento();
            restaurarEstilosPaineisDeObservacao();

        }, 1200);
    });

    // Função para mostrar/esconder o parecer do BPO/RH
    window.tratarAcaoBPO = function(obj) {
        var $painel = $(obj).closest('.panel-body');
        var valor = $(obj).val();
        
        if(valor === 'Incorreto' || valor === 'Correto') {
            $painel.find('.linha-parecer-bpo').slideDown(300);
        } else {
            $painel.find('.linha-parecer-bpo').slideUp(300);
            $painel.find('textarea[name^="cpParecercol2_tb"]').val('').trigger('change');
            $('#cpParecercol2').val('');
        }
    }

    // Função para mostrar/esconder o parecer da Ação do Solicitante
    window.tratarAcaoSolicitante = function(obj) {
        var $painel = $(obj).closest('.panel-body');
        var valor = $(obj).val();
        
        if(valor === '1') { // 1 = Reencaminhar (Devolver para o RH)
            $painel.find('.linha-parecer-acao').slideDown(300);
        } else {
            $painel.find('.linha-parecer-acao').slideUp(300);
            $painel.find('textarea[name^="cpParecerReabertura_tb"]').val('').trigger('change');
            $('#cpParecerReabertura').val('');
        }
    }

    // Função de tratamento do campo base "Ação" do Afastamento
    function tratarAcaoAfastamento(valor) {
        var $painelDataInicio = $("#DataInicio").closest('.form-group');
        var $painelDataFim = $("#DataFim").closest('.form-group');
        var $painelTipoAfastamento = $("#cpTipoAfastamentoRM").closest('.form-group');
        var $painelMotivo = $("#cpMotivoAfastamento").closest('.form-group');

        if (!valor || valor === "") {
            $painelDataInicio.hide();
            $painelDataFim.hide();
            $painelTipoAfastamento.hide();
            $painelMotivo.hide();
            
            $("#DataInicio, #DataFim").val('');
            if (window["cpTipoAfastamentoRM"]) window["cpTipoAfastamentoRM"].clear();
            if (window["cpMotivoAfastamento"]) window["cpMotivoAfastamento"].clear();
            return; 
        }

        var codigoOculto = $("#codSituacaoOculto").val();
        var situacaoDesc = $("#codSituacao").val();
        var modo = (typeof MODO_FORMULARIO !== 'undefined') ? MODO_FORMULARIO : 'ADD';
        
        if (modo !== "VIEW" && codigoOculto) {
            var codLimpo = codigoOculto.trim().toUpperCase();
            var letrasPermitidas = ["P", "T", "E", "L", "I", "R"];
            var isAfastado = (letrasPermitidas.indexOf(codLimpo) !== -1);
            
            // Validação 1: Tentou Início (2) ou Início/Fim (1) e JÁ ESTÁ afastado
            if ((valor === "1" || valor === "2") && isAfastado) {
                FLUIGC.toast({ title: 'Atenção: ', message: 'Esse colaborador ja esta afastado. (Status atual: ' + situacaoDesc + ')', type: 'warning', timeout: 6000 });
                setTimeout(function() {
                    $("#cpTipoAfastamento").val("");
                    tratarAcaoAfastamento("");
                }, 50);
                return;
            }
            
            // Validação 2: Tentou Retorno (3) e NÃO ESTÁ afastado (Lógica original)
            if (valor === "3" && !isAfastado) {
                FLUIGC.toast({ title: 'Atenção: ', message: 'O colaborador não se encontra afastado. (Status atual: ' + situacaoDesc + ')', type: 'warning', timeout: 6000 });
                setTimeout(function() {
                    $("#cpTipoAfastamento").val("");
                    tratarAcaoAfastamento("");
                }, 50);
                return; 
            }
        }

        $painelDataInicio.show();
        $painelDataFim.show();
        $painelTipoAfastamento.show();
        $painelMotivo.show();
        $("#lblDataFim").removeClass("label-obrigatorio");
        $("#lblMotivoAfastamento").removeClass("label-obrigatorio");

        if (valor === "1") {
            $("#lblDataFim").addClass("label-obrigatorio");
            $("#lblMotivoAfastamento").addClass("label-obrigatorio");
            
        } else if (valor === "2") {
            $painelDataFim.hide();
            $("#DataFim").val('');
            $("#lblMotivoAfastamento").addClass("label-obrigatorio");
            
        } else if (valor === "3") {
            $painelDataInicio.hide();
            $("#DataInicio").val('');
            
            $painelTipoAfastamento.hide();
            if (window["cpTipoAfastamentoRM"]) window["cpTipoAfastamentoRM"].clear();
            
            $painelMotivo.hide();
            if (window["cpMotivoAfastamento"]) window["cpMotivoAfastamento"].clear();
            
            $("#lblDataFim").addClass("label-obrigatorio");
        }
    }

    // Lógica para empilhar interações (Novo motor blindado)
    function adicionarInteracao(tipo) {
        var rowId = null;
        var $linhas = $("input[id^='tipoInteracao___']").closest("tr");
        
        if ($linhas.length > 0) {
            var $ultima = $linhas.last();
            var tipoAtual = $ultima.find("input[id^='tipoInteracao___']").val();
            if (!tipoAtual || tipoAtual === "") {
                rowId = $ultima.find("input[id^='tipoInteracao___']").attr("id").split("___")[1];
            }
        }
        
        if (!rowId) { rowId = wdkAddChild('tbInteracoes'); }
        $(".fluigicon-trash").hide();
        
        var $linha = $("#tipoInteracao___" + rowId).closest("tr");
        $("#tipoInteracao___" + rowId).val(tipo);

        $linha.find(".painel-solicitante-dinamico, .painel-bpo-dinamico, .painel-correcao-dinamico, .painel-acao-dinamico").hide();

        if (tipo === "SOLICITANTE") {
            $linha.find(".painel-solicitante-dinamico").show();
            $("#cpAnexoGeral_tb___" + rowId).fluigFormAttachment({ showActionButton: true, prefixName: true });
        } else if (tipo === "CORRECAO") {
            $linha.find(".painel-correcao-dinamico").show();
            $("#cpAnexoCorrecao_tb___" + rowId).fluigFormAttachment({ showActionButton: true, prefixName: true });
        } else if (tipo === "BPO") {
            $linha.find(".painel-bpo-dinamico").show();
            $("#cpRespGestor2_tb___" + rowId).val($("#cpRespGestor2").val());
            $("#cpDecisaoRH").val("");
            $("#cpParecercol2").val("");
        } else if (tipo === "ACAO") {
            $linha.find(".painel-acao-dinamico").show();
            $("#cpReaberturaChamado").val("");
            $("#cpParecerReabertura").val("");
        }
    }

    function getFieldValue($container, fieldBaseName) {
        var $el = $container.find("[id*='" + fieldBaseName + "___']");
        if ($el.length === 0) return "";
        var val = "";
        if ($el.is("input") || $el.is("textarea")) { val = $el.val(); } 
        else if ($el.is("select")) { val = $el.val(); if (!val) val = $el.find("option:selected").text(); } 
        else { val = $el.text(); }
        return (val || "").trim();
    }

    // Congelamento e bloqueio de inputs passados
    function aplicarCongelamento() {
        var atvAtual = (typeof ATIVIDADE_ATUAL !== 'undefined') ? ATIVIDADE_ATUAL : 0;
        var modo = (typeof MODO_FORMULARIO !== 'undefined') ? MODO_FORMULARIO : 'ADD';

        if (modo == "VIEW" || atvAtual >= 4) {
            var secoesFixas = ["#painelSolicitante", "#painelColaborador", "#painelAfastamento"];

            $.each(secoesFixas, function(i, secao) {
                $(secao).find(".panel-body").css("opacity", "1");
                $(secao).find("input, select, textarea").prop("readonly", true).css("pointer-events", "none").css("background-color", "#f4f6f9");
                
                $(secao).find(".select2-container").css("pointer-events", "none");
                $(secao).find(".select2-selection").css("background-color", "#f4f6f9");
            });

            var zooms = ["empresaColab", "dptoObraColab", "nomeColaborador", "cpTipoAfastamentoRM", "cpMotivoAfastamento"];
            zooms.forEach(function(z) { 
                try { if (window[z]) window[z].disable(true); } catch(e) {} 
            });
        }

        var $clonedRows = $("input[id^='tipoInteracao___']").closest("tr");
        var totalLinhas = $clonedRows.length;

        $clonedRows.each(function(index) {
            var $linhaAtual = $(this);
            var isLast = (index === totalLinhas - 1);
            var tipo = getFieldValue($linhaAtual, "tipoInteracao");
            
            if (tipo === "") {
                var obsCor = getFieldValue($linhaAtual, "cpObservacoesCorrecao_tb");
                var decisaoBPO = getFieldValue($linhaAtual, "cpDecisaoRH_tb");
                var acaoChamado = getFieldValue($linhaAtual, "cpReaberturaChamado_tb");

                if (obsCor !== "") tipo = "CORRECAO";
                else if (decisaoBPO !== "") tipo = "BPO";
                else if (acaoChamado !== "") tipo = "ACAO";
                else tipo = "SOLICITANTE";
            }

            var congelarLinha = false;
            
            if (modo === "VIEW") {
                congelarLinha = true;
            } else if (atvAtual == 4) {
                congelarLinha = !(isLast && tipo === "BPO");
            } else if (atvAtual == 6) {
                congelarLinha = !(isLast && tipo === "CORRECAO");
            } else if (atvAtual == 11) {
                congelarLinha = !(isLast && tipo === "ACAO");
            } else {
                congelarLinha = true;
            }

            if ((atvAtual == 0 || atvAtual == 3) && tipo === "SOLICITANTE" && isLast) {
                congelarLinha = false;
            }

            if (congelarLinha) {
                $linhaAtual.find("input, select, textarea").prop("readonly", true).css("pointer-events", "none").css("background-color", "#f4f6f9");
                
                if (tipo === "SOLICITANTE" || tipo === "CORRECAO") {
                    var isCorrecao = (tipo === "CORRECAO");
                    var anexoGeral = getFieldValue($linhaAtual, "cpAnexoGeral_tb");
                    var anexoCor = getFieldValue($linhaAtual, "cpAnexoCorrecao_tb");
                    var nomeArquivo = isCorrecao ? anexoCor : anexoGeral;
                    
                    $linhaAtual.find(".fluigFormAttachmentBtnDeleteFile, .fluigFormAttachmentBtnUploadFile").hide();
                    
                    if (nomeArquivo !== "") {
                        $linhaAtual.find(".row-anexo-interno").show();
                        $linhaAtual.find(".area-botoes-anexo").show();
                        var $btnVis = $linhaAtual.find(".btn-visualizar-injetado");
                        $btnVis.show();
                        $btnVis.off("click").on("click", function() { abrirAnexoFluigNativo(nomeArquivo); });
                    } else {
                        $linhaAtual.find(".row-anexo-interno").hide();
                    }
                }
            }
        });
    }

    // Extração para o Histórico de Timeline Cronológico
    function restaurarEstilosPaineisDeObservacao() {
        var contSol = 0, contBPO = 0, contCor = 0, contAcao = 0;
        var modo = (typeof MODO_FORMULARIO !== 'undefined') ? MODO_FORMULARIO : 'ADD';
        var timeline = $("#historico-timeline");
        var $clonedRows = $("input[id^='tipoInteracao___']").closest("tr");
        var totalLinhas = $clonedRows.length;

        $clonedRows.each(function(index) {
            var $linha = $(this);
            var isLast = (index === totalLinhas - 1);
            
            $linha.find(".painel-solicitante-dinamico, .painel-bpo-dinamico, .painel-correcao-dinamico, .painel-acao-dinamico").hide();

            var tipo = getFieldValue($linha, "tipoInteracao");
            var obsCor = getFieldValue($linha, "cpObservacoesCorrecao_tb");
            var decisaoBPO = getFieldValue($linha, "cpDecisaoRH_tb");
            var parecerBPO = getFieldValue($linha, "cpParecercol2_tb");
            var acaoChamado = getFieldValue($linha, "cpReaberturaChamado_tb");
            
            if (tipo === "") {
                if (obsCor !== "") tipo = "CORRECAO";
                else if (decisaoBPO !== "") tipo = "BPO";
                else if (acaoChamado !== "") tipo = "ACAO";
                else tipo = "SOLICITANTE";
            }

            var temConteudo = false;
            
            if (tipo === "SOLICITANTE") temConteudo = true; 
            if (tipo === "BPO" && (parecerBPO !== "" || (decisaoBPO !== "" && decisaoBPO !== "Selecione..."))) temConteudo = true;
            if (tipo === "CORRECAO" && obsCor !== "") temConteudo = true;
            if (tipo === "ACAO" && (acaoChamado !== "" && acaoChamado !== "Selecione...")) temConteudo = true;

            if (!temConteudo) { 
                if (modo === "VIEW" || !isLast) { return; } 
            }

            var $painelAExtrair = null;
            
            if (tipo === "SOLICITANTE") {
                contSol++;
                $painelAExtrair = $linha.find(".painel-solicitante-dinamico");
                $painelAExtrair.show();
                $painelAExtrair.find(".titulo-painel-solicitante").text("Observações e Anexos");

            } else if (tipo === "CORRECAO") {
                contCor++;
                $painelAExtrair = $linha.find(".painel-correcao-dinamico");
                $painelAExtrair.show();
                $painelAExtrair.find(".titulo-painel-correcao").text("Correção " + contCor);

            } else if (tipo === "BPO") {
                contBPO++;
                $painelAExtrair = $linha.find(".painel-bpo-dinamico");
                $painelAExtrair.show();
                $painelAExtrair.find(".titulo-painel-bpo").text("Operação IRHO " + contBPO);
                
                if (parecerBPO !== "" || (decisaoBPO !== "" && decisaoBPO !== "Selecione...")) {
                    $painelAExtrair.find(".linha-parecer-bpo").show();
                } else {
                    $painelAExtrair.find(".linha-parecer-bpo").hide();
                }

            } else if (tipo === "ACAO") {
                contAcao++;
                $painelAExtrair = $linha.find(".painel-acao-dinamico");
                $painelAExtrair.show();
                $painelAExtrair.find(".titulo-painel-acao").text("Ação do Solicitante " + contAcao);
                
                if (acaoChamado === "1") {
                    $painelAExtrair.find(".linha-parecer-acao").show();
                } else {
                    $painelAExtrair.find(".linha-parecer-acao").hide();
                }
            }
            
            if ($painelAExtrair && $painelAExtrair.length > 0) {
                $painelAExtrair.css({"margin-bottom": "0", "display": "block", "visibility": "visible"});
                timeline.append($painelAExtrair);
            }
        });
    }

    function abrirAnexoFluigNativo(fileName) {
        try {
            if (!parent.ECM || !parent.ECM.attachmentTable) return;
            var attachIndex = parent.ECM.attachmentTable.getData().findIndex(function(a) { return a.description === fileName; });
            if (attachIndex === -1) { FLUIGC.toast({title: "Atenção", message: "Anexo não encontrado.", type: "warning"}); return; }
            var e = parent.ECM.attachmentTable.getRow(attachIndex);
            if (e.documentId) {
                var t = parent.WCMAPI ? parent.WCMAPI.tenantCode || parent.WCMAPI.organizationId : 1;
                parent.WKFViewAttachment.openAttachmentView(t, e.documentId, e.version);
            } else {
                FLUIGC.toast({title: "Aviso", message: "Arquivo não sincronizado.", type: "info"});
            }
        } catch(e) {}
    }

    // ========================================================
    function buscarGestorAjax(codSecao, codColigada, callbackSucesso, callbackErro) {
        var requestData = {
            "name": "ds_gestoresColaboradoresSecao",
            "fields": [],
            "constraints": [
                { "_field": "CODSECAO", "_initialValue": String(codSecao).trim(), "_finalValue": String(codSecao).trim(), "_type": 1, "_likeSearch": false },
                { "_field": "CODCOLIGADA", "_initialValue": String(codColigada).trim(), "_finalValue": String(codColigada).trim(), "_type": 1, "_likeSearch": false }
            ],
            "order": []
        };
        var processarRetorno = function(data) {
            var content = [];
            if (data && Array.isArray(data.values)) { content = data.values; } 
            else if (data && data.content && Array.isArray(data.content.values)) { content = data.content.values; } 
            else if (data && Array.isArray(data.content)) { content = data.content; } 
            else if (Array.isArray(data)) { content = data; }
            callbackSucesso(content);
        };
        var tentarFallback = function() {
            $.ajax({
                url: '/ecm/api/rest/ecm/dataset/getDataset',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(requestData),
                success: processarRetorno,
                error: callbackErro
            });
        };
        try {
            if (typeof window.parent !== 'undefined' && window.parent.WCMAPI) {
                window.parent.WCMAPI.Create({
                    url: "/api/public/ecm/dataset/datasets/",
                    type: "POST",
                    contentType: "application/json",
                    data: JSON.stringify(requestData),
                    success: processarRetorno,
                    error: function(err) { tentarFallback(); }
                });
            } else { tentarFallback(); }
        } catch(e) { tentarFallback(); }
    }

    function setSelectedZoomItem(selectedItem) {
        if (selectedItem.inputId == "empresaColab") {
            window["dptoObraColab"].disable(false);
            var filter = "CODCOLIGADA," + selectedItem.COLIGADA;
            if (selectedItem.CODFILIAL) { filter += ",CODFILIAL," + selectedItem.CODFILIAL; }
            reloadZoomFilterValues("dptoObraColab", filter);
        }
        
        if (selectedItem.inputId == "dptoObraColab") {
            window["nomeColaborador"].disable(false);
            reloadZoomFilterValues("nomeColaborador", "CODSECAO," + selectedItem.CODIGO);
        }
        
        if (selectedItem.inputId == "nomeColaborador") {
            var acaoAfastamento = $("#cpTipoAfastamento").val();
            var valCodSit = selectedItem.CODSITUACAO || "";
            if (Array.isArray(valCodSit)) valCodSit = valCodSit[0];
            var codSitLimpo = String(valCodSit).trim().toUpperCase();

            var valSit = selectedItem.SITUACAO || "";
            if (Array.isArray(valSit)) valSit = valSit[0];
            var sitStr = String(valSit).trim();

            $("#matricula").val(selectedItem.CHAPA || "");
            $("#cargo").val(selectedItem.CARGO || "");
            $("#dataAdmissao").val(selectedItem.DATAADMISSAO || "");
            $("#tipoFuncionario").val(selectedItem.TIPOFUNCIONARIO || "");
            $("#codSituacao").val(sitStr); 
            $("#codSituacaoOculto").val(codSitLimpo); 
            $("#TxtChapa").val(selectedItem.CHAPA || "");
            $("#gestor").val("Buscando gestor...");
            
            $("#painelAfastamento .panel-body").css({"pointer-events": "auto", "opacity": "1"});

            var letrasPermitidas = ["P", "T", "E", "L", "I", "R"];
            var isAfastado = (codSitLimpo !== "" && letrasPermitidas.indexOf(codSitLimpo) !== -1);

            // Validação encadeada no evento de escolha da lupa
            if (isAfastado) {
                if (acaoAfastamento === "1" || acaoAfastamento === "2") {
                    FLUIGC.toast({ title: 'Atenção: ', message: 'Esse colaborador ja esta afastado.', type: 'warning', timeout: 5000 });
                    $("#cpTipoAfastamento").val("");
                    tratarAcaoAfastamento("");
                }
            } else {
                if (acaoAfastamento === "3") {
                    FLUIGC.toast({ title: 'Atenção: ', message: 'O colaborador não se encontra afastado.', type: 'warning', timeout: 5000 });
                    $("#cpTipoAfastamento").val("");
                    tratarAcaoAfastamento("");
                }
            }
            
            setTimeout(function() {
                var codSecao = Array.isArray(selectedItem.CODSECAO) ? selectedItem.CODSECAO[0] : selectedItem.CODSECAO;
                var codColigada = Array.isArray(selectedItem.CODCOLIGADA) ? selectedItem.CODCOLIGADA[0] : selectedItem.CODCOLIGADA;

                if (codSecao && codColigada) {
                    buscarGestorAjax(codSecao, codColigada, function(content) {
                        if (content && content.length > 0) {
                            var row = content[0];
                            if (row.ERRO) { $("#gestor").val("Erro ao ler integração (F12)"); return; }
                            var codGestor = row.CHAPASUBST && String(row.CHAPASUBST) !== "null" ? String(row.CHAPASUBST).trim() : "";
                            var nomeGestor = row.NOME1 && String(row.NOME1) !== "null" ? String(row.NOME1).trim() : "";
                            if (codGestor !== "" && nomeGestor !== "") { $("#gestor").val(codGestor + " - " + nomeGestor); } 
                            else if (nomeGestor !== "") { $("#gestor").val(nomeGestor); } 
                            else if (codGestor !== "") { $("#gestor").val(codGestor); } 
                            else { $("#gestor").val("Gestor cadastrado sem nome ou código"); }
                        } else { $("#gestor").val("Nenhum gestor encontrado na tabela"); }
                    }, function(err) { $("#gestor").val("Falha de comunicação (401)"); });
                } else { $("#gestor").val("Colaborador sem Seção/Coligada"); }
            }, 150);
        }
    }

    function removedZoomItem(removedItem) {
        var colaboradorRemovido = false;
        if (removedItem.inputId == "empresaColab") {
            reloadZoomFilterValues("dptoObraColab", "");
            if(window["dptoObraColab"]) { window["dptoObraColab"].clear(); window["dptoObraColab"].disable(true); }
            reloadZoomFilterValues("nomeColaborador", "");
            if(window["nomeColaborador"]) { window["nomeColaborador"].clear(); window["nomeColaborador"].disable(true); }
            $("#matricula, #cargo, #dataAdmissao, #gestor, #tipoFuncionario, #codSituacao, #codSituacaoOculto, #TxtChapa").val("");
            colaboradorRemovido = true;
        }
        if (removedItem.inputId == "dptoObraColab") {
            reloadZoomFilterValues("nomeColaborador", "");
            if(window["nomeColaborador"]) { window["nomeColaborador"].clear(); window["nomeColaborador"].disable(true); }
            $("#matricula, #cargo, #dataAdmissao, #gestor, #tipoFuncionario, #codSituacao, #codSituacaoOculto, #TxtChapa").val("");
            colaboradorRemovido = true;
        }
        if (removedItem.inputId == "nomeColaborador") {
            $("#matricula, #cargo, #dataAdmissao, #gestor, #tipoFuncionario, #codSituacao, #codSituacaoOculto, #TxtChapa").val("");
            colaboradorRemovido = true;
        }
        if (colaboradorRemovido) {
            $("#painelAfastamento .panel-body").css({"pointer-events": "none", "opacity": "0.4"});
            $("#cpTipoAfastamento option[value='3']").prop("disabled", false); 
            $("#cpTipoAfastamento, #DataInicio, #DataFim").val('');
            if(window["cpTipoAfastamentoRM"]) window["cpTipoAfastamentoRM"].clear();
            if(window["cpMotivoAfastamento"]) window["cpMotivoAfastamento"].clear();
            tratarAcaoAfastamento("");
        }
    }
